# Alembic configuration. See https://alembic.sqlalchemy.org/en/latest/tutorial.html
#
# Database URL is loaded from `src.core.config.settings.DATABASE_URL` (the
# direct, port-5432 URL — NOT the pool URL). Migration connections should not
# go through the pgbouncer transaction pool because DDL statements require
# session-level features.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
output_encoding = utf-8

# Use file-based template for migrations (slightly more verbose than the
# default, but explicit and self-documenting).
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for `create_date` on alembic_version. We use UTC everywhere.
timezone = UTC

# Don't run in offline mode unless explicitly requested
# (we set this in env.py for the `--sql` path)

# [post_write_hooks] is intentionally omitted — pre-commit handles formatting.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
